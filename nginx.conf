# Global directives (must be only here)
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log notice;
pid /run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile            on;
    tcp_nopush          on;
    keepalive_timeout   65;
    types_hash_max_size 4096;

    # Include other configs if needed
    include /etc/nginx/conf.d/*.conf;

    # Server block for frontend
    server {
        listen       80;
        listen       [::]:80;
        server_name  _;
        root         /usr/share/nginx/html;

        # Error pages
        error_page 404 /404.html;
        location = /404.html {}

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {}

        # Static images
        location /images/ {
            expires 5s;
            root   /usr/share/nginx/html;
            try_files $uri /images/placeholder.jpg;
        }

        # Proxy locations for microservices
        location /api/catalogue/ { proxy_pass http://{{ CATALOGUE_HOST }}:8080/; }
        location /api/user/      { proxy_pass http://{{ USER_HOST }}:8080/; }
        location /api/cart/      { proxy_pass http://{{ CART_HOST }}:8080/; }
        location /api/shipping/  { proxy_pass http://{{ SHIPPING_HOST }}:8080/; }
        location /api/payment/   { proxy_pass http://{{ PAYMENT_HOST }}:8080/; }

        # Health endpoint
        location /health {
            stub_status on;
            access_log off;
        }
    }
}